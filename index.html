<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2c2c2c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="收音机">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>晶体管收音机</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.20/hls.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.14.9/cdn.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="radio" x-data="radio()">
  <div class="antenna">
    <div class="antenna-base"></div>
    <div class="antenna-rod"></div>
    <div class="antenna-rivet"></div>
  </div>
  <div class="radio-inner">
    <div class="speaker-section">

    </div>
    <div class="right-section">
      <div class="display">
        <div class="source-label" x-text="sourceLabel">云听</div>
        <div class="station-info">
            <img class="station-image" x-bind:src="currentStation?.image || '/station-fallback.svg'" alt="">
          <div class="station-meta">
            <div class="station-name" x-text="currentStation?.name || '--'">--</div>
            <div class="station-freq" x-text="currentStation?.freq || ''"></div>
            <div class="station-subtitle" x-text="(currentStation?.subtitle || '').replace(/^正在直播：/, '')"></div>
          </div>
        </div>
        <div class="top-right-info">
          <div class="channel-counter" x-text="channelCounterText">0 / 0</div>
        </div>
        <div class="error-state" x-text="errorMsg" x-show="errorMsg"></div>
      </div>
      <div class="controls">
        <div class="source-zone">
          <button class="zone-btn" @click="switchSource">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="17 1 21 5 17 9"/>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
              <polyline points="7 23 3 19 7 15"/>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
            </svg>
          </button>
          <div class="zone-placeholder"></div>
          <div class="zone-placeholder"></div>
        </div>
        <button class="control-btn skip-btn" @click="prevStation" aria-label="上一个频道">
          <svg class="btn-icon" viewBox="0 0 24 24" width="31" height="31">
            <polyline points="12,7 7,12 12,17" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="17,7 12,12 17,17" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="control-btn play-btn" @click="togglePlay" :class="{ playing: isPlaying }" aria-label="播放/暂停">
          <svg class="btn-icon play-icon" x-show="!isPlaying" viewBox="0 0 24 24" width="35" height="35">
            <polygon points="8,5 20,12 8,19" fill="currentColor"/>
          </svg>
          <svg class="btn-icon pause-icon" x-show="isPlaying" viewBox="0 0 24 24" width="35" height="35">
            <rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor"/>
            <rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor"/>
          </svg>
        </button>
        <button class="control-btn skip-btn" @click="nextStation" aria-label="下一个频道">
          <svg class="btn-icon" viewBox="0 0 24 24" width="31" height="31">
            <polyline points="12,7 17,12 12,17" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="7,7 12,12 7,17" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <audio x-ref="audio" style="display:none"></audio>
</div>

<script src="app.js"></script>
</body>
</html>
